<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kumbotso true builder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',arial}
body{background:#f5f7fa}

/* THUMBNAIL COVER + LOGO */
header{position:relative;width:100%;height:500px;background:#0a3d62}
.hero{width:100%;height:100%;object-fit:cover;display:block}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5)}
.logo-box{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(10,61,98,0.9);padding:25px 40px;border-radius:20px;
    border:3px solid #ffd700;text-align:center;z-index:2
}
.logo-box h1{color:#ffd700;font-size:2.8em;text-shadow:2px 2px 8px #000}
.logo-box p{color:#fff;font-size:1.3em;margin-top:10px}

.promo{background:linear-gradient(90deg,#ff0000,#ff8c00,#ffd700);color:#fff;text-align:center;padding:16px;font-weight:bold;font-size:19px}

.btns{text-align:center;padding:35px;background:#fff}
.btn{padding:18px 32px;border-radius:60px;text-decoration:none;font-weight:bold;font-size:17px;margin:12px;display:inline-block}
.call{background:#28a745;color:#fff}
.whatsapp{background:linear-gradient(90deg,#ffd700,#ff8c00);color:#000;animation:goldpulse 2s infinite}
.map{background:#0a3d62;color:#fff}
@keyframes goldpulse{0%{box-shadow:0 0 0 0 rgba(255,215,0,0.8)}70%{box-shadow:0 0 0 25px rgba(255,215,0,0)}100%{box-shadow:0 0 0 0 rgba(255,215,0,0)}}

.container{max-width:1100px;margin:40px auto;padding:20px}
h2{text-align:center;color:#0a3d62;font-size:2.2em;margin-bottom:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
.grid img{width:100%;height:270px;object-fit:cover;border-radius:15px;box-shadow:0 6px 20px rgba(0,0,0,0.2)}

.location{background:#0a3d62;color:#fff;text-align:center;padding:40px}
.location h2{color:#ffd700}
footer{background:#111;color:#aaa;text-align:center;padding:20px}
</style>
</head>
<body>

<header>
    <img src="./aiki1.jpg" class="hero" alt="kumbotso cover">
    <div class="overlay"></div>
    <div class="logo-box">
        <h1>kumbotso true builder</h1>
        <p>masana gini na gaskiya</p>
    </div>
</header>

<div class="promo">20% raba-aji + garanti shekaru 5</div>

<div class="btns">
    <a href="tel:+2347036936911" class="btn call">kira ni yanzu</a>
    <a href="https://wa.me/2347036936911" class="btn whatsapp">whatsapp</a><br><br>
    <a href="https://maps.google.com" class="btn map">google map</a>
</div>

<div class="container">
    <h2>hotunan ayyukanmu</h2>
    <div class="grid">
        <img src="./aiki2.jpg" alt="aiki2">
        <img src="./aiki3.jpg" alt="aiki3">
        <img src="./aiki4.jpg" alt="aiki4">
        <img src="./aiki5.jpg" alt="aiki5">
        <img src="./aiki6.jpg" alt="aiki6">
        <img src="./aiki7.jpg" alt="aiki7">
        <img src="./aiki8.jpg" alt="aiki8">
        <img src="./aiki9.jpg" alt="aiki9">
        <img src="./aiki10.jpg" alt="aiki10">
    </div>
</div>

<div class="location">
    <h2>muna nan don muku hidima</h2>
    <p>address: kumbotso, kano state, nigeria</p>
    <p>waya: +2347036936911</p>
</div>

<footer>&copy; 2026 kumbotso true builder</footer>

</body>
</html>
