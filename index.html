<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUMBOTSO TRUE BUILDER - Masana Gini na Gaskiya</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Arial, sans-serif; }
body { background:#f8f9fa; color:#333; }
.sticky-cta { position:sticky; top:0; z-index:999; display:flex; gap:10px; background:#fff; padding:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
.sticky-cta a { flex:1; text-align:center; padding:14px; border-radius:50px; color:#fff; font-weight:bold; text-decoration:none; font-size:16px; animation:float 2.5s ease-in-out infinite; }
.sticky-cta a[href^="tel:"]{ background:linear-gradient(135deg, #25D366, #128C7E); }
.sticky-cta a[href^="https://wa.me"]{ background:linear-gradient(135deg, #FF0000, #CC0000); }
@keyframes float{ 0%,100% {transform:translateY(0)} 50% {transform:translateY(-6px)} }
header { position:relative; text-align:center; background:#0a1a2f; }
.cover-img { width:100%; height:280px; object-fit:cover; display:block; filter:brightness(0.85); }
.logo { width:130px; height:130px; border-radius:50%; border:5px solid #FFD700; box-shadow:0 0 25px #FFD700; margin-top:-65px; position:relative; z-index:2; background:#fff; }
header h1 { font-size:32px; margin:15px 0 5px; color:#fff; padding:0 20px; }
.tagline { color:#FFD700; font-weight:bold; font-size:15px; margin-bottom:20px; padding:0 20px; }
.promo { background:linear-gradient(135deg, #FF9500, #FF6A00); color:#fff; text-align:center; padding:18px; margin:20px; border-radius:15px; font-weight:bold; font-size:17px; }
.container { padding:20px; max-width:900px; margin:auto; }
h2 { text-align:center; margin:20px 0; color:#0a1a2f; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
.grid img { width:100%; border-radius:12px; }
</style>
</head>
<body>

<div class="sticky-cta">
    <a href="tel:+2347038118332">📞 Kira</a>
    <a href="https://wa.me/2347038118332">💬 WhatsApp</a>
</div>

<header>
    <img src="cover.jpg" alt="Kumbotso True Builder Cover" class="cover-img">
    <img src="company-profile.jpg" alt="Kumbotso True Builder Logo" class="logo">
    <h1>KUMBOTSO TRUE BUILDER</h1>
    <p class="tagline">Masana Gini Na Gaskiya | Kumbotso, Kano State, Nigeria</p>
</header>

<div class="promo">
    🎉 20% RABA-AJI 🎉 <br>
    Ga sabbin abokan ciniki na Watan nan
</div>

<div class="container">
    <h2>Ayukanmu</h2>
    <div class="grid">
        <img src="work1.jpg" alt="Aiki 1">
        <img src="work2.jpg" alt="Aiki 2">
    </div>
</div>

</body>
</html>
